services:
  - type: web
    name: needmo-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: needmo-db
          property: connectionString
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SENDER_NAME
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_EXPIRE_HOURS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: needmo-db
    databaseName: needmo_db
    user: needmo_user
